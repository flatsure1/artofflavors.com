backend:
  name: github
  repo: flatsure1/artofflavors.com
  branch: main
  auth_type: pkce
  app_id: Ov23liKHI1ktV0UPr5uh

media_folder: assets/images/uploads
public_folder: /assets/images/uploads

collections:
  - name: recipes
    label: "🍽 Recipes"
    folder: _recipes
    create: true
    slug: "{{slug}}"
    preview_path: "recipes/{{slug}}/"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Category", name: "category", widget: "string" }
      - { label: "Description", name: "description", widget: "string" }
      - { label: "Emoji / Icon", name: "emoji", widget: "string", default: "🍽" }
      - { label: "Prep Time", name: "prep_time", widget: "string", required: false }
      - { label: "Cook Time", name: "cook_time", widget: "string", required: false }
      - { label: "Total Time", name: "total_time", widget: "string", required: false }
      - { label: "Serves", name: "serves", widget: "string", required: false }
      - { label: "Skill Level", name: "level", widget: "select", options: ["Beginner", "Intermediate", "Advanced"], required: false }
      - { label: "Cuisine", name: "cuisine", widget: "string", default: "French", required: false }
      - { label: "Chef's Quote", name: "quote", widget: "string", required: false }
      - label: "Ingredients"
        name: "ingredients"
        widget: "list"
        required: false
        fields:
          - { label: "Amount", name: "amount", widget: "string" }
          - { label: "Ingredient", name: "name", widget: "string" }
      - label: "Steps"
        name: "steps"
        widget: "list"
        required: false
        fields:
          - { label: "Step Number", name: "num", widget: "string" }
          - { label: "Step Title", name: "title", widget: "string" }
          - { label: "Step Description", name: "desc", widget: "text" }
      - { label: "Chef's Notes", name: "chefs_note", widget: "text", required: false }
      - { label: "Introduction / Body", name: "body", widget: "markdown" }

  - name: posts
    label: "📓 Journal"
    folder: _posts
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    preview_path: "journal/{{year}}/{{month}}/{{day}}/{{slug}}/"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Tag", name: "tag", widget: "string" }
      - { label: "Excerpt", name: "excerpt", widget: "string" }
      - { label: "Emoji", name: "emoji", widget: "string", default: "🍴", required: false }
      - { label: "Body", name: "body", widget: "markdown" }